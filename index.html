<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#080a0f"><title>Dossier 17</title><style>:root{--bg:#07090d;--panel:#111722;--ink:#eef2f8;--muted:#8f99aa;--red:#d74a4a;--gold:#e8bd6b;--line:#293346}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 80% 12%,#251116 0,transparent 32rem),linear-gradient(#090c12,#050609);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.top{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#07090ddd;backdrop-filter:blur(10px);z-index:3}.brand{display:flex;align-items:center;gap:11px;letter-spacing:.14em;font-size:.8rem}.mark{width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--red);color:var(--red);font-weight:900;transform:rotate(-3deg)}button,input{font:inherit}.reset,.secondary{background:transparent;color:var(--ink);border:1px solid var(--red);padding:11px 14px;font-weight:800}.wrap{width:min(960px,calc(100% - 18px));margin:16px auto 70px}.panel{background:linear-gradient(145deg,#121925f7,#0a0e15f7);border:1px solid var(--line);box-shadow:0 25px 80px #0008;padding:22px;position:relative}.panel:before{content:"";position:absolute;left:0;right:35%;top:0;height:2px;background:linear-gradient(90deg,var(--red),transparent)}.eyebrow{color:var(--red);letter-spacing:.17em;font-size:.7rem}h1{font:500 clamp(2rem,8vw,4.3rem)/1.05 Georgia,serif;margin:14px 0 22px}h1 span{color:var(--muted)}h2{font:500 1.5rem Georgia,serif}p{line-height:1.68}.lead{color:#c4ccd8}.warning,.terminal,.coords,.artifact{border:1px solid var(--line);background:#070a0f;padding:17px;margin:20px 0}.warning{border-left:3px solid var(--gold)}label{display:block;color:var(--muted);font-size:.76rem;margin:22px 0 8px}input{width:100%;min-height:50px;background:#070a0f;color:var(--ink);border:1px solid var(--line);padding:0 14px;outline:none}input:focus{border-color:var(--red)}.primary{width:100%;min-height:50px;background:var(--red);color:white;border:0;font-weight:900;letter-spacing:.1em;margin-top:10px}.grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(250px,.8fr);gap:16px}.num{font-size:4rem;font-weight:900;color:#d74a4a22;float:right}.content{min-height:260px;color:#c4cdda}.feedback{min-height:22px}.good{color:#72d395}.bad{color:#ff7777}.story{border-left:2px solid var(--line);padding-left:13px;color:var(--muted);margin:18px 0}.hintText{color:var(--gold);margin-top:15px;line-height:1.55}.photo{height:260px;display:grid;place-items:center;background:radial-gradient(circle,#171d26,#030405 70%);border:1px solid #202938;margin:18px 0;overflow:hidden}.hiddenWord{font-size:clamp(2rem,10vw,4.5rem);letter-spacing:.12em;color:#202630;opacity:.12;filter:brightness(.7);transition:.2s}.slider{width:100%;accent-color:var(--red)}.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:18px 0}.tile{aspect-ratio:1;background:#171e29;border:1px solid var(--line);display:grid;place-items:center;font-size:1.6rem;font-weight:900;color:var(--gold);touch-action:manipulation}.tile.active{outline:2px solid var(--red)}.morse{display:flex;align-items:center;gap:12px;margin:20px 0}.dot{width:14px;height:14px;border-radius:50%;background:var(--red)}.wave{height:76px;display:flex;align-items:center;gap:5px;margin:16px 0}.bar{width:8px;background:var(--red);opacity:.8;border-radius:4px}.phone{border:1px solid var(--line);border-radius:26px;padding:16px;background:#06080c;margin:18px 0}.msg{max-width:82%;padding:11px 13px;border-radius:16px 16px 16px 4px;background:#1a2230;margin:8px 0}.msg.me{margin-left:auto;background:#6e2626;border-radius:16px 16px 4px 16px}.coords{text-align:center;color:var(--gold);font-size:1.3rem;letter-spacing:.1em}.compass{width:190px;height:190px;border:1px solid var(--line);border-radius:50%;margin:18px auto;display:grid;place-items:center;position:relative}.needle{width:5px;height:78px;background:linear-gradient(var(--red) 50%,#bbb 50%);transform-origin:50% 100%;transition:.2s;position:absolute;bottom:50%}.compass span{position:absolute}.n{top:8px}.s{bottom:8px}.e{right:10px}.w{left:10px}blockquote{font:1.28rem/1.6 Georgia,serif;border-left:3px solid var(--red);padding-left:17px;margin:26px 0}@media(max-width:760px){.grid{grid-template-columns:1fr}.side{order:2}.top{padding:0 10px}.brand{font-size:.72rem}.reset{font-size:.66rem;padding:9px}.panel{padding:20px}}</style></head><body><header class="top"><div class="brand"><span class="mark">17</span><span>DOSSIER <b style="color:#d74a4a">NOIR</b></span></div><button class="reset" id="reset">RÉINITIALISER</button></header><main class="wrap" id="app"></main><script>(()=>{"use strict";const levels=[{slug:"signal",title:"Le signal faible",eye:"ARCHIVE 01 · PHOTO ALTÉRÉE",answers:["veilleur"],story:"Une photo presque noire a été récupérée. Elias avait l’habitude de dissimuler ses mots dans la lumière.",hints:["Utilise le curseur sous la photo.","Pousse la luminosité presque au maximum.","Le mot est VEILLEUR."],body:`<p>Restaure l’image pour révéler le mot caché.</p><div class="photo"><div class="hiddenWord" id="hiddenWord">VEILLEUR</div></div><label>LUMINOSITÉ</label><input class="slider" id="brightness" type="range" min="0" max="100" value="5">`},{slug:"ordre",title:"Les quatre fragments",eye:"ARCHIVE 02 · MESSAGE DÉCOUPÉ",answers:["0217","02:17","217"],story:"Quatre fragments d’un horodatage ont été mélangés. Sur téléphone, Elias savait que le toucher était plus sûr qu’un clavier.",hints:["Touche les cases dans l’ordre chronologique.","Commence par 0 puis 2.","La séquence est 02:17."],body:`<p>Touche les quatre fragments dans le bon ordre pour reconstituer l’heure du dernier contact.</p><div class="tiles" id="tiles"><button class="tile" data-v="1">1</button><button class="tile" data-v="7">7</button><button class="tile" data-v="0">0</button><button class="tile" data-v="2">2</button></div><div class="terminal" id="sequence">Séquence : —</div>`},{slug:"audio",title:"La voix sous le bruit",eye:"ARCHIVE 03 · TRANSMISSION",answers:["nord"],story:"Le fichier audio est trop abîmé pour contenir une voix, mais son rythme est intact.",hints:["Les sons courts sont des points, les longs des tirets.","La séquence est -. / --- / .-. / -..", "Le message dit NORD."],body:`<p>Écoute la transmission Morse puis décode les quatre lettres.</p><div class="morse"><span class="dot"></span><button class="secondary" id="play">▶ LIRE</button></div><div class="wave">${[20,55,28,65,35,70,22,48,68,30,58,24].map(h=>`<span class="bar" style="height:${h}px"></span>`).join("")}</div><div class="terminal">Mini-clé : N = −· · O = −−− · R = ·−· · D = −··</div>`},{slug:"conversation",title:"Le témoin ment",eye:"ARCHIVE 04 · CONVERSATION RÉCUPÉRÉE",answers:["gare"],story:"Une discussion effacée a été restaurée. Le témoin prétend ne jamais avoir vu Elias, mais un détail le trahit.",hints:["Compare ce que dit le témoin avec son dernier message.","Il affirme être chez lui, mais parle du quai 3.","Le lieu est la GARE."],body:`<p>Où se trouvait réellement le témoin ?</p><div class="phone"><div class="msg">Je n’ai pas quitté mon appartement ce soir-là.</div><div class="msg me">Tu es certain ?</div><div class="msg">Oui. J’ai seulement entendu l’annonce du train de 02:17 sur le quai 3.</div></div>`},{slug:"carte",title:"Le point fixe",eye:"ARCHIVE 05 · LOCALISATION PUBLIQUE",answers:["1889"],story:"Le dernier indice mélange direction et coordonnées. Aucun déplacement n’est nécessaire.",hints:["La boussole pointe vers le nord, puis les coordonnées donnent un monument parisien.","Le monument est la tour Eiffel.","Son inauguration date de 1889."],body:`<p>Oriente l’aiguille vers le nord, puis identifie le monument associé aux coordonnées.</p><div class="compass"><span class="n">N</span><span class="s">S</span><span class="e">E</span><span class="w">O</span><div class="needle" id="needle"></div></div><button class="secondary" id="turn">TOURNER LA BOUSSOLE</button><div class="coords">48.8584, 2.2945</div><p>Donne l’année d’inauguration du monument.</p>`}];const app=document.querySelector("#app"),state=JSON.parse(localStorage.getItem("d17v2")||'{"name":""}');const norm=s=>s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");function save(){localStorage.setItem("d17v2",JSON.stringify(state))}function go(s){location.hash="#/"+s}function home(){app.innerHTML=`<section class="panel"><p class="eyebrow">ARCHIVE RÉCUPÉRÉE · 02:17</p><h1>Le créateur du site a disparu.<br><span>Quelqu’un continue pourtant de publier.</span></h1><p class="lead">Une enquête pensée d’abord pour smartphone : lumière, toucher, audio, conversation et carte.</p><div class="warning"><b>Règle du jeu</b><p>Aucun code source à ouvrir, aucune intrusion, aucun lieu dangereux. Tout est jouable depuis ce téléphone.</p></div><label>TON PSEUDONYME</label><input id="name" maxlength="24" value="${state.name||""}"><button class="primary" id="start">OUVRIR LE DOSSIER</button></section>`;document.querySelector("#start").onclick=()=>{state.name=document.querySelector("#name").value.trim()||"Veilleur";save();go("signal")}}function level(i){const l=levels[i];app.innerHTML=`<section class="grid"><article class="panel"><span class="num">0${i+1}</span><p class="eyebrow">${l.eye}</p><h1>${l.title}</h1><div class="content">${l.body}</div><form id="form"><label>RÉPONSE</label><input id="answer" autocomplete="off"><button class="primary">VALIDER</button><p class="feedback" id="feed"></p></form></article><aside class="panel side"><p class="eyebrow">AIDE PROGRESSIVE</p><h2>Canal sécurisé</h2><div class="story"><b>${state.name||"Veilleur"},</b><br>${l.story}</div><button class="secondary" id="hint">DÉVERROUILLER UN INDICE</button><div class="hintText" id="hintText"></div></aside></section>`;let h=0;document.querySelector("#hint").onclick=()=>document.querySelector("#hintText").textContent=l.hints[Math.min(h++,2)];document.querySelector("#form").onsubmit=e=>{e.preventDefault();const ok=l.answers.map(norm).includes(norm(document.querySelector("#answer").value)),f=document.querySelector("#feed");f.className="feedback "+(ok?"good":"bad");f.textContent=ok?"Accès autorisé…":"Réponse refusée.";if(ok)setTimeout(()=>i===4?go("fin"):go(levels[i+1].slug),600)};wire(i)}function wire(i){if(i===0){const r=document.querySelector("#brightness"),w=document.querySelector("#hiddenWord");r.oninput=()=>{w.style.opacity=String(.08+Number(r.value)/105);w.style.filter=`brightness(${.6+Number(r.value)/20})`}}if(i===1){let seq="";document.querySelectorAll(".tile").forEach(b=>b.onclick=e=>{e.preventDefault();seq+=b.dataset.v;b.classList.add("active");document.querySelector("#sequence").textContent="Séquence : "+seq;document.querySelector("#answer").value=seq})}if(i===2)document.querySelector("#play").onclick=play;if(i===4){let a=130;const n=document.querySelector("#needle");n.style.transform=`rotate(${a}deg)`;document.querySelector("#turn").onclick=()=>{a=Math.max(0,a-26);n.style.transform=`rotate(${a}deg)`}}}function play(){const ctx=new(window.AudioContext||window.webkitAudioContext)(),seq="-. --- .-. -..",u=.12;let t=ctx.currentTime+.1;for(const c of seq){if(c===" "){t+=u*3;continue}const d=c==="."?u:u*3,o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=650;g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.2,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+d+.02);t+=d+u}}function end(){app.innerHTML=`<section class="panel"><p class="eyebrow">DOSSIER 17 · DÉCHIFFRÉ</p><h1>Tu n’as pas retrouvé Elias.<br><span>Tu as prouvé qu’il est encore là.</span></h1><blockquote>« Je ne me cachais pas d’eux. Je me cachais de celui qui résoudrait tout. Maintenant, je sais que tu existes. »</blockquote><p>Fin du prologue mobile. Le prochain chapitre pourra intégrer e-mails, vidéos différées et indices physiques facultatifs.</p><button class="primary" id="again">REJOUER</button></section>`;document.querySelector("#again").onclick=()=>{localStorage.removeItem("d17v2");go("accueil")}}function render(){const s=location.hash.replace(/^#\//,"")||"accueil";if(s==="accueil")return home();if(s==="fin")return end();const i=levels.findIndex(x=>x.slug===s);i<0?go("accueil"):level(i)}document.querySelector("#reset").onclick=()=>{localStorage.removeItem("d17v2");go("accueil")};addEventListener("hashchange",render);render()})();</script></body></html>
