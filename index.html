<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07090d">
<title>Dossier 17</title>
<style>
:root{--bg:#07090d;--panel:#101722;--ink:#eef2f8;--muted:#909bac;--red:#d54b4b;--gold:#e5bc69;--line:#293447;--ok:#79d49a}
*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at 85% 10%,#281318 0,transparent 34rem),linear-gradient(#090c12,#050609);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
button,input{font:inherit}.top{height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#07090de8;backdrop-filter:blur(10px);z-index:5}.brand{display:flex;align-items:center;gap:10px;letter-spacing:.14em;font-size:.77rem}.mark{width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--red);color:var(--red);font-weight:900;transform:rotate(-3deg)}
.wrap{width:min(980px,calc(100% - 18px));margin:16px auto 70px}.panel{position:relative;background:linear-gradient(145deg,#121925,#090d14);border:1px solid var(--line);padding:21px;box-shadow:0 22px 75px #0009}.panel:before{content:"";position:absolute;left:0;right:35%;top:0;height:2px;background:linear-gradient(90deg,var(--red),transparent)}.grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(250px,.82fr);gap:16px}.side{align-self:start}.ey{color:var(--red);font-size:.69rem;letter-spacing:.17em}.num{float:right;font-size:4rem;line-height:1;color:#d54b4b22;font-weight:900}h1{font:500 clamp(2rem,8vw,4.25rem)/1.05 Georgia,serif;margin:14px 0 21px}h1 span{color:var(--muted)}h2{font:500 1.5rem Georgia,serif}p{line-height:1.65}.lead{color:#c6ced9}.content{min-height:290px;color:#c7d0dc}.box{border:1px solid var(--line);background:#05070b;padding:16px;margin:18px 0}.story{color:var(--muted);border-left:2px solid var(--line);padding-left:12px;line-height:1.6}.clues{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0 0}.chip{border:1px solid var(--line);padding:7px 9px;font-size:.72rem;color:var(--gold);background:#080b11}.primary,.secondary{min-height:48px;font:800 .78rem ui-monospace,monospace;letter-spacing:.08em}.primary{width:100%;border:0;background:var(--red);color:#fff;margin-top:12px}.secondary{border:1px solid var(--red);background:transparent;color:var(--ink);padding:0 14px}.secondary:disabled,.primary:disabled{opacity:.45}.status{min-height:24px;margin-top:12px}.good{color:var(--ok)}.bad{color:#ff7d7d}.hintText{color:var(--gold);margin-top:14px;line-height:1.55}.hidden{display:none!important}
.reveal{height:330px;position:relative;overflow:hidden;border:1px solid var(--line);background:#020304;touch-action:none;user-select:none}.room{position:absolute;inset:0;background:radial-gradient(circle at 18% 25%,#141922,transparent 17%),radial-gradient(circle at 82% 70%,#151a23,transparent 18%),linear-gradient(135deg,#06080c,#010203)}.glyph{position:absolute;font:900 clamp(2rem,12vw,4.8rem) Georgia,serif;color:#e4e8ee;opacity:.025;transition:opacity .18s,transform .18s}.glyph.found{opacity:.9;transform:scale(1.08);text-shadow:0 0 18px #e7bd6b55}.g1{left:12%;top:15%}.g2{right:13%;top:26%}.g3{left:22%;bottom:15%}.g4{right:17%;bottom:11%}.torch{position:absolute;width:135px;height:135px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;background:radial-gradient(circle,#fff9 0,#f0cf7770 28%,#f0cf7715 55%,transparent 73%);mix-blend-mode:screen;display:none}.foundLine{text-align:center;letter-spacing:.25em;font-size:1.15rem;color:var(--gold);margin-top:12px}
.dial{width:min(330px,88vw);aspect-ratio:1;margin:18px auto;position:relative;border:1px solid var(--line);border-radius:50%;background:radial-gradient(circle,#111823 0 41%,#080b11 42% 58%,#111823 59% 100%);box-shadow:inset 0 0 40px #000}.dial:after{content:"";position:absolute;inset:47%;border-radius:50%;background:var(--red);box-shadow:0 0 18px #d54b4b88}.dir{position:absolute;color:var(--muted);font-size:.73rem}.dn{top:8px;left:50%;transform:translateX(-50%)}.de{right:9px;top:50%;transform:translateY(-50%)}.ds{bottom:8px;left:50%;transform:translateX(-50%)}.dw{left:9px;top:50%;transform:translateY(-50%)}.dialBtn{position:absolute;width:72px;height:72px;border-radius:50%;border:1px solid var(--line);background:#171f2b;color:var(--gold);font-size:1.7rem;font-weight:900}.dialBtn.ok{outline:2px solid var(--ok);background:#13241b}.dialBtn.wrong{animation:shake .24s;background:#4c1b1b}.b0{left:50%;top:40px;transform:translateX(-50%)}.b2{right:40px;top:50%;transform:translateY(-50%)}.b1{left:50%;bottom:40px;transform:translateX(-50%)}.b7{left:40px;top:50%;transform:translateY(-50%)}@keyframes shake{25%{margin-left:-5px}75%{margin-left:5px}}.sequence{text-align:center;font-size:1.35rem;letter-spacing:.22em}
.files{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:18px 0}.file{min-height:115px;text-align:left;border:1px solid var(--line);background:#0b1018;color:var(--ink);padding:14px;position:relative}.file b{display:block;color:var(--gold);font-size:1.15rem;margin-bottom:7px}.file small{color:var(--muted)}.file:after{content:"ARCHIVE";position:absolute;right:10px;bottom:8px;color:#ffffff15;font-size:.75rem}.file.open{outline:2px solid var(--ok);background:#102018}.file.wrong{animation:shake .24s;background:#35191b}.archiveResult{border-left:3px solid var(--ok)}
.mapFrame{height:350px;border:1px solid var(--line);position:relative;overflow:hidden;background:#030507;touch-action:none}.map{position:absolute;width:430px;height:430px;left:50%;top:50%;margin:-215px 0 0 -215px;border-radius:50%;background:repeating-linear-gradient(0deg,#15202c 0 1px,transparent 1px 34px),repeating-linear-gradient(90deg,#15202c 0 1px,transparent 1px 34px),radial-gradient(circle at 46% 58%,#273545 0 5px,transparent 6px),radial-gradient(circle,#101722,#070b10 68%);border:1px solid #334055;transform:rotate(137deg);transition:transform .08s linear}.river{position:absolute;left:15%;right:15%;top:48%;height:30px;border-radius:50%;border-top:8px solid #294c67;transform:rotate(-18deg);opacity:.85}.northArrow{position:absolute;left:50%;top:22px;transform:translateX(-50%);color:var(--red);font-weight:900;font-size:1.1rem}.northArrow:before{content:"▲";display:block;text-align:center;font-size:2rem}.mapLabels{position:absolute;inset:0}.mapLabels span{position:absolute;color:#8793a3;font-size:.66rem}.ml1{left:18%;top:35%}.ml2{right:16%;top:58%}.ml3{left:43%;bottom:20%}.coordLock{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:15px 16px;border:1px solid var(--line);background:#05070be8;color:#687384;letter-spacing:.1em;text-align:center;min-width:240px;transition:.2s}.coordLock.unlocked{color:var(--gold);border-color:var(--ok);box-shadow:0 0 30px #79d49a22}.rotateHint{text-align:center;color:var(--muted);font-size:.78rem;margin-top:10px}.rotationMeter{text-align:center;color:var(--gold);margin-top:10px}
.finalCard{border:1px solid var(--line);background:linear-gradient(145deg,#101721,#070a0f);padding:18px;margin:18px 0}.coords{font-size:1.35rem;letter-spacing:.11em;color:var(--gold);text-align:center}.chain{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:18px 0}.chain div{border:1px solid var(--line);padding:11px 7px;text-align:center;font-size:.72rem;color:var(--muted)}.chain b{display:block;color:var(--gold);font-size:.9rem;margin-bottom:5px}input{width:100%;min-height:50px;background:#05070b;color:var(--ink);border:1px solid var(--line);padding:0 13px}label{display:block;color:var(--muted);font-size:.75rem;margin:18px 0 8px}
@media(max-width:760px){.grid{grid-template-columns:1fr}.side{order:2}.panel{padding:19px}.files{grid-template-columns:1fr 1fr}.chain{grid-template-columns:1fr 1fr}.top{padding:0 9px}.brand{font-size:.7rem}.secondary{padding:0 10px}.mapFrame{height:320px}}
</style>
</head>
<body>
<header class="top"><div class="brand"><span class="mark">17</span><span>DOSSIER <b style="color:#d54b4b">NOIR</b></span></div><button id="reset" class="secondary">RESET</button></header>
<main id="app" class="wrap"></main>
<script>
(()=>{"use strict";
const app=document.querySelector("#app");
const state=JSON.parse(localStorage.getItem("d17v5")||'{"name":"","direction":"","time":"","coords":""}');
const save=()=>localStorage.setItem("d17v5",JSON.stringify(state));
const go=s=>location.hash="#/"+s;
const side=(text)=>`<aside class="panel side"><p class="ey">CHAÎNE D’INDICES</p><div class="story">${text}</div><div class="clues">${state.direction?`<span class="chip">DIRECTION · ${state.direction}</span>`:""}${state.time?`<span class="chip">HEURE · ${state.time}</span>`:""}${state.coords?`<span class="chip">COORDONNÉES ACQUISES</span>`:""}</div></aside>`;
function home(){app.innerHTML=`<section class="panel"><p class="ey">PROLOGUE MOBILE · VERSION 5</p><h1>Chaque indice a une fonction.<br><span>Aucune action n’est décorative.</span></h1><p class="lead">Elias a laissé une chaîne verrouillée : une direction ouvre un cadran, le cadran ouvre une archive, l’archive ouvre une carte.</p><label>TON PSEUDONYME</label><input id="name" maxlength="24" value="${state.name||""}"><button class="primary" id="start">OUVRIR LE DOSSIER</button></section>`;document.querySelector("#start").onclick=()=>{state.name=document.querySelector("#name").value.trim()||"Veilleur";save();go("lampe")}}
function lamp(){app.innerHTML=`<section class="grid"><article class="panel"><span class="num">01</span><p class="ey">ARCHIVE 01 · PHOTO NOIRE</p><h1>Les quatre lettres</h1><div class="content"><p>La photo contient quatre marques. Explore-la avec ton doigt : chaque lettre trouvée sera conservée.</p><div class="reveal" id="reveal"><div class="room"></div><span class="glyph g1" data-letter="N">N</span><span class="glyph g2" data-letter="O">O</span><span class="glyph g3" data-letter="R">R</span><span class="glyph g4" data-letter="D">D</span><div class="torch" id="torch"></div></div><div class="foundLine" id="foundLine">_ _ _ _</div><p id="status" class="status"></p><button class="primary" id="next" disabled>UTILISER LA DIRECTION</button></div></article>${side("Elias écrivait : « Commence toujours par regarder dans la bonne direction. » La direction trouvée servira immédiatement au cadran suivant.")}</section>`;
const r=document.querySelector("#reveal"),torch=document.querySelector("#torch"),glyphs=[...document.querySelectorAll(".glyph")],found=new Set(),line=document.querySelector("#foundLine"),next=document.querySelector("#next");
const move=e=>{e.preventDefault();const p=e.touches?e.touches[0]:e,rect=r.getBoundingClientRect(),x=p.clientX-rect.left,y=p.clientY-rect.top;torch.style.display="block";torch.style.left=x+"px";torch.style.top=y+"px";glyphs.forEach(g=>{const gr=g.getBoundingClientRect(),cx=gr.left+gr.width/2-rect.left,cy=gr.top+gr.height/2-rect.top;if(Math.hypot(x-cx,y-cy)<72){g.classList.add("found");found.add(g.dataset.letter)}});line.textContent=["N","O","R","D"].map(l=>found.has(l)?l:"_").join(" ");if(found.size===4){state.direction="NORD";save();next.disabled=false;document.querySelector("#status").className="status good";document.querySelector("#status").textContent="Direction acquise : NORD."}};
r.addEventListener("touchstart",move,{passive:false});r.addEventListener("touchmove",move,{passive:false});r.addEventListener("touchend",()=>torch.style.display="none");r.addEventListener("pointerdown",move);r.addEventListener("pointermove",e=>{if(e.buttons)move(e)});r.addEventListener("pointerup",()=>torch.style.display="none");next.onclick=()=>go("cadran")}
function dial(){if(!state.direction)return go("lampe");app.innerHTML=`<section class="grid"><article class="panel"><span class="num">02</span><p class="ey">ARCHIVE 02 · CADRAN</p><h1>Lis depuis le nord</h1><div class="content"><p>Le premier indice donne le point de départ. Lis ensuite les positions dans le sens horaire.</p><div class="dial"><span class="dir dn">N</span><span class="dir de">E</span><span class="dir ds">S</span><span class="dir dw">O</span><button class="dialBtn b0" data-v="0">0</button><button class="dialBtn b2" data-v="2">2</button><button class="dialBtn b1" data-v="1">1</button><button class="dialBtn b7" data-v="7">7</button></div><div class="box sequence" id="seq">— — : — —</div><p id="status" class="status"></p><button id="next" class="primary" disabled>OUVRIR LES ARCHIVES</button></div></article>${side("NORD n’était pas une réponse isolée : il indique la première position du cadran. Une erreur efface toute la lecture.")}</section>`;
const target=["0","2","1","7"],buttons=[...document.querySelectorAll(".dialBtn")],seq=document.querySelector("#seq"),next=document.querySelector("#next");let pos=0,values=[];const reset=b=>{b.classList.add("wrong");document.querySelector("#status").className="status bad";document.querySelector("#status").textContent="Mauvais départ ou mauvais sens : lecture effacée.";setTimeout(()=>{buttons.forEach(x=>x.classList.remove("ok","wrong"));pos=0;values=[];seq.textContent="— — : — —"},360)};buttons.forEach(b=>b.onclick=()=>{const v=b.dataset.v;if(v!==target[pos])return reset(b);b.classList.add("ok");values.push(v);pos++;seq.textContent=`${values[0]||"—"} ${values[1]||"—"} : ${values[2]||"—"} ${values[3]||"—"}`;if(pos===4){state.time="02:17";save();document.querySelector("#status").className="status good";document.querySelector("#status").textContent="Horodatage acquis : 02:17.";next.disabled=false}});next.onclick=()=>go("archives")}
function archives(){if(!state.time)return go("cadran");app.innerHTML=`<section class="grid"><article class="panel"><span class="num">03</span><p class="ey">ARCHIVE 03 · SERVEUR DE VIDÉOS</p><h1>Le bon enregistrement</h1><div class="content"><p>Quatre fichiers ont survécu. L’horodatage obtenu au cadran désigne le seul fichier utile.</p><div class="files"><button class="file" data-time="00:21"><b>00:21</b><small>Caméra 04 · couloir vide</small></button><button class="file" data-time="02:17"><b>02:17</b><small>Caméra 17 · paquet transmis</small></button><button class="file" data-time="12:07"><b>12:07</b><small>Caméra 09 · signal coupé</small></button><button class="file" data-time="17:02"><b>17:02</b><small>Caméra 02 · test automatique</small></button></div><div id="result" class="box">Aucun fichier ouvert.</div><button id="next" class="primary" disabled>EXAMINER LA CARTE</button></div></article>${side("Le code 02:17 n’est pas une simple réponse : il sélectionne précisément l’enregistrement contenant la carte d’Elias.")}</section>`;
const result=document.querySelector("#result"),next=document.querySelector("#next"),files=[...document.querySelectorAll(".file")];files.forEach(f=>f.onclick=()=>{files.forEach(x=>x.classList.remove("open","wrong"));if(f.dataset.time!==state.time){f.classList.add("wrong");result.className="box bad";result.textContent="Fichier inutile : aucun paquet cartographique à cette heure.";return}f.classList.add("open");result.className="box archiveResult good";result.innerHTML="<b>Paquet récupéré.</b><br>Une carte a été volontairement tournée. Note jointe : « Remets le nord à sa place. »";next.disabled=false});next.onclick=()=>go("carte")}
function mapLevel(){if(!state.time)return go("archives");app.innerHTML=`<section class="grid"><article class="panel"><span class="num">04</span><p class="ey">ARCHIVE 04 · CARTE ROTATIVE</p><h1>Remets le nord en haut</h1><div class="content"><p>Fais tourner la carte avec ton doigt. Les coordonnées ne deviennent lisibles que lorsque le nord est correctement aligné.</p><div class="mapFrame" id="frame"><div class="map" id="map"><div class="river"></div><div class="northArrow">N</div><div class="mapLabels"><span class="ml1">SECTEUR 17</span><span class="ml2">CANAL</span><span class="ml3">POINT FIXE</span></div><div class="coordLock" id="coord">SIGNAL BROUILLÉ<br>••.••••, •.••••</div></div></div><div class="rotateHint">Glisse horizontalement sur la carte pour la faire tourner.</div><div class="rotationMeter" id="meter">Écart au nord : 137°</div><button id="next" class="primary" disabled>UTILISER LES COORDONNÉES</button></div></article>${side("La direction NORD intervient une seconde fois : elle permet de remettre la carte dans le bon sens et de rendre les coordonnées lisibles.")}</section>`;
let angle=137,startX=null,startAngle=angle;const frame=document.querySelector("#frame"),map=document.querySelector("#map"),meter=document.querySelector("#meter"),coord=document.querySelector("#coord"),next=document.querySelector("#next");const normalize=a=>((a%360)+360)%360;const dist=a=>Math.min(normalize(a),360-normalize(a));const draw=()=>{map.style.transform=`rotate(${angle}deg)`;const d=Math.round(dist(angle));meter.textContent=`Écart au nord : ${d}°`;if(d<=5){angle=0;map.style.transform="rotate(0deg)";coord.classList.add("unlocked");coord.innerHTML="48.8584, 2.2945<br><small>POINT FIXE ACQUIS</small>";state.coords="48.8584, 2.2945";save();next.disabled=false;meter.textContent="Nord aligné : coordonnées déverrouillées."}else{coord.classList.remove("unlocked");coord.innerHTML="SIGNAL BROUILLÉ<br>••.••••, •.••••";next.disabled=true}};const down=e=>{const p=e.touches?e.touches[0]:e;startX=p.clientX;startAngle=angle};const move=e=>{if(startX===null)return;e.preventDefault();const p=e.touches?e.touches[0]:e;angle=startAngle+(p.clientX-startX)*.65;draw()};const up=()=>startX=null;frame.addEventListener("touchstart",down,{passive:false});frame.addEventListener("touchmove",move,{passive:false});frame.addEventListener("touchend",up);frame.addEventListener("pointerdown",down);frame.addEventListener("pointermove",e=>{if(e.buttons)move(e)});frame.addEventListener("pointerup",up);draw();next.onclick=()=>go("final")}
function final(){if(!state.coords)return go("carte");app.innerHTML=`<section class="grid"><article class="panel"><span class="num">05</span><p class="ey">ARCHIVE 05 · POINT FIXE</p><h1>Le rendez-vous d’Elias</h1><div class="content"><div class="finalCard"><p class="coords">${state.coords}</p><p>Les coordonnées désignent un monument. Son année d’inauguration est le dernier mot de passe.</p></div><div class="chain"><div><b>NORD</b>départ du cadran</div><div><b>02:17</b>bon fichier</div><div><b>NORD</b>orientation de la carte</div><div><b>COORD.</b>lieu final</div></div><label>ANNÉE D’INAUGURATION</label><input id="answer" inputmode="numeric" autocomplete="off"><button id="validate" class="primary">DÉVERROUILLER LE MESSAGE</button><p id="status" class="status"></p><div id="ending" class="box hidden"></div></div></article>${side("Toutes les actions convergent ici. Le monument est la tour Eiffel ; son année d’inauguration ouvre le message final.")}</section>`;document.querySelector("#validate").onclick=()=>{const a=document.querySelector("#answer").value.trim(),status=document.querySelector("#status"),ending=document.querySelector("#ending");if(a!=="1889"){status.className="status bad";status.textContent="Mot de passe incorrect.";return}status.className="status good";status.textContent="Accès autorisé.";ending.classList.remove("hidden");ending.innerHTML=`<p class="ey">MESSAGE D’ELIAS · DÉCHIFFRÉ</p><p>« ${state.name||"Veilleur"}, tu n’as pas suivi cinq énigmes séparées. Tu as reconstruit mon trajet : <b>nord</b>, <b>02:17</b>, la carte, puis la Dame de fer.</p><p>Le prochain dossier commencera exactement là où celui-ci s’arrête. »</p>`}}
function render(){const s=location.hash.replace(/^#\//,"")||"accueil";({accueil:home,lampe:lamp,cadran:dial,archives:archives,carte:mapLevel,final:final}[s]||home)()}
document.querySelector("#reset").onclick=()=>{localStorage.removeItem("d17v5");location.hash="#/accueil";location.reload()};addEventListener("hashchange",render);render();
})();
</script>
</body>
</html>
