<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#080a0f"><title>Dossier 17</title><style>:root{--bg:#07090d;--panel:#111722;--ink:#edf1f7;--muted:#8f99aa;--red:#d74a4a;--gold:#e8bd6b;--line:#283244}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 80% 15%,#251116 0,transparent 35rem),linear-gradient(#090c12,#050609);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.top{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#07090ddd;backdrop-filter:blur(10px);z-index:3}.brand{display:flex;align-items:center;gap:12px;letter-spacing:.15em;font-size:.82rem}.mark{width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--red);color:var(--red);font-weight:900;transform:rotate(-3deg)}button,input{font:inherit}.reset,.hint{background:transparent;color:var(--ink);border:1px solid var(--red);padding:11px 14px;font-weight:800}.wrap{width:min(1050px,calc(100% - 20px));margin:26px auto 70px}.panel{background:linear-gradient(145deg,#121925f7,#0a0e15f7);border:1px solid var(--line);box-shadow:0 25px 80px #0008;padding:clamp(24px,6vw,64px);position:relative}.panel:before{content:"";position:absolute;left:0;right:35%;top:0;height:2px;background:linear-gradient(90deg,var(--red),transparent)}.eyebrow{color:var(--red);letter-spacing:.18em;font-size:.72rem}h1{font:500 clamp(2.1rem,8vw,4.6rem)/1.05 Georgia,serif;margin:15px 0 24px}h1 span{color:var(--muted)}p{line-height:1.7}.lead{color:#c2cad6;font-size:1.05rem}.warning,.terminal,.coords{border:1px solid var(--line);background:#070a0f;padding:18px;margin:24px 0}.warning{border-left:3px solid var(--gold)}label{display:block;color:var(--muted);font-size:.78rem;margin:24px 0 8px}input{width:100%;min-height:50px;background:#070a0f;color:var(--ink);border:1px solid var(--line);padding:0 14px;outline:none}input:focus{border-color:var(--red)}.primary{width:100%;min-height:50px;background:var(--red);color:white;border:0;font-weight:900;letter-spacing:.1em;margin-top:10px}.grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(260px,.8fr);gap:18px}.case,.side{padding:clamp(22px,4vw,46px)}.side{align-self:start}.num{font-size:4rem;font-weight:900;color:#d74a4a22;float:right}.content{min-height:250px;color:#c4cdda}.feedback{min-height:22px}.good{color:#72d395}.bad{color:#ff7777}.story{border-left:2px solid var(--line);padding-left:14px;color:var(--muted);margin:18px 0}.hintText{color:var(--gold);margin-top:16px;line-height:1.55}.darkword{height:250px;display:grid;place-items:center;background:radial-gradient(circle,#161c26,#030405 70%);border:1px solid #202938;margin:20px 0;color:#242b36;font-size:clamp(2rem,9vw,4rem);letter-spacing:.15em;text-shadow:0 0 12px #0b0d12}.coords{text-align:center;color:var(--gold);font-size:1.35rem;letter-spacing:.12em}.morse{display:flex;align-items:center;gap:12px;margin:20px 0}.dot{width:14px;height:14px;border-radius:50%;background:var(--red)}blockquote{font:1.3rem/1.6 Georgia,serif;border-left:3px solid var(--red);padding-left:18px;margin:28px 0}@media(max-width:760px){.grid{grid-template-columns:1fr}.top{padding:0 10px}.brand{font-size:.72rem}.reset{font-size:.68rem;padding:9px}.wrap{margin-top:14px}.panel{padding:22px}.side{order:2}}</style><!-- ARCHIVE 17 : le dossier ne s'ouvre qu'à DIX-SEPT --></head><body><header class="top"><div class="brand"><span class="mark">17</span><span>DOSSIER <b style="color:#d74a4a">NOIR</b></span></div><button class="reset" id="reset">RÉINITIALISER</button></header><main class="wrap" id="app"></main><script>(()=>{"use strict";// Rapport réseau : relais actif / AUXERRE / 02:17
const levels=[{slug:"signal",title:"Le signal faible",eye:"ARCHIVE 01 · IMAGE ENDOMMAGÉE",answers:["veilleur"],story:"Une image a été jointe au dernier message d’Elias. Elle paraît vide, mais elle contient davantage qu’elle ne montre.",hints:["Le noir n’est pas toujours complètement noir.","Augmente la luminosité ou incline l’écran.","Le mot caché est VEILLEUR."],body:`<p>« Celui qui observe voit ce que les autres prennent pour du vide. »</p><div class="darkword">VEILLEUR</div><p>Quel mot est caché dans l’image ?</p>`},{slug:"veilleur",title:"L’adresse te regarde",eye:"ARCHIVE 02 · ROUTE INCONNUE",answers:["17","dix-sept","dix sept"],story:"Elias utilisait les adresses web et le code des pages comme cachettes.",hints:["Observe l’adresse de la page et le code HTML.","Sur ordinateur : affiche le code source. Sur mobile, demande l’indice suivant.","Le commentaire HTML parle de DIX-SEPT."],body:`<p>Le serveur répond :</p><div class="terminal">&gt; Le dossier ne porte aucun nom. Seulement un numéro.</div><p>Quel est ce numéro ?</p>`},{slug:"archive-17",title:"Le commentaire oublié",eye:"ARCHIVE 03 · SCRIPT CORROMPU",answers:["auxerre"],story:"Une partie du journal réseau a été oubliée dans le code JavaScript.",hints:["Cherche dans le code de la page.","Repère la ligne « Rapport réseau ».","La ville est AUXERRE."],body:`<p>Un développeur ne supprime jamais vraiment ses secrets : il les commente.</p><div class="terminal">const server = "hors-ligne";<br>const lastContact = "02:17";<br>// relais actif : [DONNÉE MASQUÉE]</div><p>Retrouve le nom de la ville conservé dans le code.</p>`},{slug:"auxerre",title:"La voix sous le bruit",eye:"ARCHIVE 04 · TRANSMISSION 0217",answers:["nord"],story:"Le relais contient une transmission composée de bips courts et longs.",hints:["Un bip court vaut un point, un long vaut un tiret.","La séquence est -. / --- / .-. / -..", "Le message dit NORD."],body:`<p>Écoute les quatre lettres encodées en Morse.</p><div class="morse"><span class="dot"></span><button class="hint" id="play">▶ LIRE LA TRANSMISSION</button></div><div class="terminal">CANAL 17 · 650 Hz · séquence restaurée</div>`},{slug:"nord",title:"Le point fixe",eye:"ARCHIVE 05 · COORDONNÉES PUBLIQUES",answers:["1889"],story:"La direction NORD révèle deux coordonnées publiques. Aucun déplacement n’est nécessaire.",hints:["Copie les coordonnées dans un service de cartographie.","Elles indiquent la tour Eiffel.","Son année d’inauguration est 1889."],body:`<p>Identifie le monument indiqué par ces coordonnées :</p><div class="coords">48.8584, 2.2945</div><p>Donne son année d’inauguration.</p>`}];const app=document.querySelector("#app"),state=JSON.parse(localStorage.getItem("d17")||'{"name":"","level":0}');const norm=s=>s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");function save(){localStorage.setItem("d17",JSON.stringify(state))}function go(s){location.hash="#/"+s}function home(){app.innerHTML=`<section class="panel"><p class="eyebrow">ARCHIVE RÉCUPÉRÉE · 02:17</p><h1>Le créateur du site a disparu.<br><span>Quelqu’un continue pourtant de publier.</span></h1><p class="lead">Cinq énigmes liées par une histoire. Observe l’image, l’adresse, le code et le son.</p><div class="warning"><b>Règle du jeu</b><p>Aucune intrusion, aucun lieu dangereux, aucune donnée personnelle. Tout est résoluble à distance.</p></div><label>TON PSEUDONYME</label><input id="name" maxlength="24" value="${state.name}"><button class="primary" id="start">OUVRIR LE DOSSIER</button></section>`;document.querySelector("#start").onclick=()=>{state.name=document.querySelector("#name").value.trim()||"Veilleur";save();go("signal")}}function level(i){const l=levels[i];state.level=Math.max(state.level,i+1);save();app.innerHTML=`<section class="grid"><article class="panel case"><span class="num">0${i+1}</span><p class="eyebrow">${l.eye}</p><h1>${l.title}</h1><div class="content">${l.body}</div><form id="form"><label>RÉPONSE</label><input id="answer" autocomplete="off"><button class="primary">VALIDER</button><p class="feedback" id="feed"></p></form></article><aside class="panel side"><p class="eyebrow">AIDE PROGRESSIVE</p><h2>Canal sécurisé</h2><div class="story"><b>${state.name||"Veilleur"},</b><br>${l.story}</div><button class="hint" id="hint">DÉVERROUILLER UN INDICE</button><div class="hintText" id="hintText"></div></aside></section>`;let h=0;document.querySelector("#hint").onclick=()=>document.querySelector("#hintText").textContent=l.hints[Math.min(h++,2)];document.querySelector("#form").onsubmit=e=>{e.preventDefault();const ok=l.answers.map(norm).includes(norm(document.querySelector("#answer").value)),f=document.querySelector("#feed");f.className="feedback "+(ok?"good":"bad");f.textContent=ok?"Accès autorisé…":"Réponse refusée.";if(ok)setTimeout(()=>i===4?go("fin"):go(levels[i+1].slug),650)};const p=document.querySelector("#play");if(p)p.onclick=play}function play(){const ctx=new(window.AudioContext||window.webkitAudioContext)(),seq="-. --- .-. -..",u=.12;let t=ctx.currentTime+.1;for(const c of seq){if(c===" "){t+=u*3;continue}const d=c==="."?u:u*3,o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=650;g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.2,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+d+.02);t+=d+u}}function end(){app.innerHTML=`<section class="panel"><p class="eyebrow">DOSSIER 17 · DÉCHIFFRÉ</p><h1>Tu n’as pas retrouvé Elias.<br><span>Tu as prouvé qu’il est encore là.</span></h1><blockquote>« Je ne me cachais pas d’eux. Je me cachais de celui qui résoudrait tout. Maintenant, je sais que tu existes. »</blockquote><button class="primary" onclick="localStorage.removeItem('d17');location.hash='#/accueil';location.reload()">REJOUER</button></section>`}function render(){const s=location.hash.replace(/^#\//,"")||"accueil";if(s==="accueil")return home();if(s==="fin")return end();const i=levels.findIndex(x=>x.slug===s);i<0?go("accueil"):level(i)}document.querySelector("#reset").onclick=()=>{localStorage.removeItem("d17");go("accueil");render()};addEventListener("hashchange",render);render()})();</script></body></html>
