<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Dossier 17</title><style>:root{--p:#111722;--i:#eef2f8;--m:#929cad;--r:#d74a4a;--g:#e7bd6b;--l:#293346}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#090c12,#050609);color:var(--i);font-family:ui-monospace,monospace;min-height:100vh}.top{height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--l);position:sticky;top:0;background:#07090ddd;z-index:4}.brand{display:flex;gap:10px;align-items:center;letter-spacing:.14em;font-size:.78rem}.mark{width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--r);color:var(--r);font-weight:900}.wrap{width:min(930px,calc(100% - 18px));margin:16px auto 60px}.panel{background:linear-gradient(145deg,#121925,#0a0e15);border:1px solid var(--l);padding:21px;box-shadow:0 20px 70px #0008}.ey{color:var(--r);font-size:.7rem;letter-spacing:.17em}h1{font:500 clamp(2rem,8vw,4.2rem)/1.05 Georgia,serif;margin:14px 0 22px}h1 span{color:var(--m)}p{line-height:1.65}.lead{color:#c4ccd8}.grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(250px,.8fr);gap:16px}.num{float:right;font-size:4rem;color:#d74a4a22;font-weight:900}.content{min-height:280px;color:#c4cdda}.box{border:1px solid var(--l);background:#06080c;padding:16px;margin:18px 0}.primary,.secondary{min-height:48px;font:800 .78rem ui-monospace,monospace;letter-spacing:.08em}.primary{width:100%;border:0;background:var(--r);color:#fff;margin-top:10px}.secondary{border:1px solid var(--r);background:transparent;color:var(--i);padding:0 14px}input{width:100%;min-height:50px;background:#06080c;color:var(--i);border:1px solid var(--l);padding:0 13px;font:inherit}label{display:block;color:var(--m);font-size:.75rem;margin:20px 0 8px}.story{color:var(--m);border-left:2px solid var(--l);padding-left:12px;line-height:1.6}.hintText{color:var(--g);margin-top:14px;line-height:1.5}.feedback{min-height:22px}.good{color:#75d79a}.bad{color:#ff7777}.reveal{height:300px;position:relative;overflow:hidden;border:1px solid var(--l);background:#020304;touch-action:none;user-select:none}.scene{position:absolute;inset:0;background:radial-gradient(circle at 20% 30%,#161b23,transparent 18%),radial-gradient(circle at 80% 65%,#141922,transparent 18%),linear-gradient(135deg,#06080b,#010203)}.secret{position:absolute;inset:0;display:grid;place-items:center;font-size:clamp(2rem,11vw,4.5rem);letter-spacing:.13em;font-weight:900;color:#d8dde5;opacity:.05}.torch{position:absolute;width:125px;height:125px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;background:radial-gradient(circle,#fff9 0,#f0cf7770 27%,#f0cf7718 54%,transparent 72%);mix-blend-mode:screen;display:none}.instruction{text-align:center;color:var(--m);font-size:.8rem;margin-top:10px}.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:18px 0}.tile{aspect-ratio:1;border:1px solid var(--l);background:#171e29;color:var(--g);font-size:1.7rem;font-weight:900}.tile.ok{outline:2px solid #6dcb8c}.tile.wrong{animation:shake .25s;background:#4b1a1a}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}.sequence{text-align:center;font-size:1.2rem;letter-spacing:.2em}.phone{border:1px solid var(--l);border-radius:24px;padding:15px;background:#05070b}.msg{max-width:84%;padding:10px 12px;background:#1a2230;border-radius:15px 15px 15px 4px;margin:8px 0}.msg.me{margin-left:auto;background:#6e2626;border-radius:15px 15px 4px 15px}.coords{text-align:center;color:var(--g);font-size:1.3rem;letter-spacing:.1em}.compass{width:190px;height:190px;border:1px solid var(--l);border-radius:50%;margin:18px auto;position:relative;display:grid;place-items:center}.needle{width:5px;height:78px;background:linear-gradient(var(--r) 50%,#bbb 50%);position:absolute;bottom:50%;transform-origin:50% 100%;transition:.2s}.compass span{position:absolute}.n{top:8px}.s{bottom:8px}.e{right:10px}.w{left:10px}@media(max-width:760px){.grid{grid-template-columns:1fr}.side{order:2}.panel{padding:19px}}</style></head><body><header class="top"><div class="brand"><span class="mark">17</span><span>DOSSIER <b style="color:#d74a4a">NOIR</b></span></div><button id="reset" class="secondary">RESET</button></header><main id="app" class="wrap"></main><script>(()=>{"use strict";const levels=[{slug:"signal",title:"La pièce noire",eye:"ARCHIVE 01 · PHOTO ENDOMMAGÉE",answers:["veilleur"],story:"La photo paraît vide. Elias a laissé une phrase : « La lumière ne vient pas toujours d’en haut. »",hints:["Maintiens ton doigt sur l’image.","Déplace lentement ton doigt sur toute la surface.","Le mot révélé est VEILLEUR."],body:`<p>Quelque chose est caché dans cette pièce.</p><div class="reveal" id="reveal"><div class="scene"></div><div class="secret" id="secret">VEILLEUR</div><div class="torch" id="torch"></div></div><div class="instruction">Maintiens le doigt sur l’image et explore-la.</div>`},{slug:"ordre",title:"La serrure temporelle",eye:"ARCHIVE 02 · CLAVIER DÉFECTUEUX",answers:["0217","02:17"],story:"Le système accepte quatre chiffres. Une seule erreur efface immédiatement la saisie.",hints:["Le dernier contact a eu lieu après deux heures du matin.","Le nombre 17 revient partout dans le dossier.","La séquence correcte est 0, 2, 1, 7."],body:`<p>Recompose l’heure du dernier contact. Une erreur remet la serrure à zéro.</p><div class="tiles" id="tiles"><button class="tile" data-v="1">1</button><button class="tile" data-v="7">7</button><button class="tile" data-v="0">0</button><button class="tile" data-v="2">2</button></div><div class="box sequence" id="sequence">— — — —</div>`},{slug:"audio",title:"La voix sous le bruit",eye:"ARCHIVE 03 · TRANSMISSION",answers:["nord"],story:"La voix est perdue, mais le rythme a survécu.",hints:["Un son court vaut un point, un long vaut un tiret.","La séquence est -. / --- / .-. / -..","Le message dit NORD."],body:`<p>Écoute puis décode la transmission Morse.</p><button class="secondary" id="play">▶ LIRE LA TRANSMISSION</button><div class="box">Mini-clé : N = −· · O = −−− · R = ·−· · D = −··</div>`},{slug:"conversation",title:"Le témoin ment",eye:"ARCHIVE 04 · CONVERSATION",answers:["gare"],story:"Le témoin nie avoir vu Elias, mais son propre message le trahit.",hints:["Cherche un détail impossible à entendre depuis son appartement.","Il cite précisément un quai.","Il était à la GARE."],body:`<p>Où se trouvait réellement le témoin ?</p><div class="phone"><div class="msg">Je n’ai pas quitté mon appartement ce soir-là.</div><div class="msg me">Tu en es certain ?</div><div class="msg">Oui. J’ai seulement entendu l’annonce du train de 02:17 sur le quai 3.</div></div>`},{slug:"carte",title:"Le point fixe",eye:"ARCHIVE 05 · COORDONNÉES",answers:["1889"],story:"Le dernier indice associe une direction et un lieu public.",hints:["Oriente l’aiguille vers N puis cherche les coordonnées.","Le lieu est la tour Eiffel.","Elle a été inaugurée en 1889."],body:`<p>Réoriente l’aiguille, puis identifie le monument.</p><div class="compass"><span class="n">N</span><span class="s">S</span><span class="e">E</span><span class="w">O</span><div class="needle" id="needle"></div></div><button class="secondary" id="turn">TOURNER</button><div class="box coords">48.8584, 2.2945</div><p>Donne son année d’inauguration.</p>`}];const app=document.querySelector("#app"),state=JSON.parse(localStorage.getItem("d17v3")||'{"name":""}'),norm=s=>s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""),go=s=>location.hash="#/"+s;function home(){app.innerHTML=`<section class="panel"><p class="ey">PROLOGUE MOBILE · VERSION 3</p><h1>Le créateur du site a disparu.<br><span>Quelqu’un continue pourtant de publier.</span></h1><p class="lead">Une enquête tactile et sonore. Aucun code source, aucune commande évidente.</p><label>TON PSEUDONYME</label><input id="name" value="${state.name||""}"><button class="primary" id="start">OUVRIR LE DOSSIER</button></section>`;document.querySelector("#start").onclick=()=>{state.name=document.querySelector("#name").value.trim()||"Veilleur";localStorage.setItem("d17v3",JSON.stringify(state));go("signal")}}function level(i){const l=levels[i];app.innerHTML=`<section class="grid"><article class="panel"><span class="num">0${i+1}</span><p class="ey">${l.eye}</p><h1>${l.title}</h1><div class="content">${l.body}</div><form id="form"><label>RÉPONSE</label><input id="answer" autocomplete="off"><button class="primary">VALIDER</button><p id="feed" class="feedback"></p></form></article><aside class="panel side"><p class="ey">AIDE PROGRESSIVE</p><div class="story"><b>${state.name||"Veilleur"},</b><br>${l.story}</div><button class="secondary" id="hint">DÉVERROUILLER UN INDICE</button><div id="hintText" class="hintText"></div></aside></section>`;let h=0;document.querySelector("#hint").onclick=()=>document.querySelector("#hintText").textContent=l.hints[Math.min(h++,2)];document.querySelector("#form").onsubmit=e=>{e.preventDefault();const ok=l.answers.map(norm).includes(norm(document.querySelector("#answer").value)),f=document.querySelector("#feed");f.className="feedback "+(ok?"good":"bad");f.textContent=ok?"Accès autorisé…":"Réponse refusée.";if(ok)setTimeout(()=>i===4?go("fin"):go(levels[i+1].slug),500)};wire(i)}function wire(i){if(i===0){const r=document.querySelector("#reveal"),t=document.querySelector("#torch"),s=document.querySelector("#secret");let seen=0;const move=e=>{e.preventDefault();const p=e.touches?e.touches[0]:e,rect=r.getBoundingClientRect(),x=p.clientX-rect.left,y=p.clientY-rect.top;t.style.display="block";t.style.left=x+"px";t.style.top=y+"px";seen++;s.style.opacity=Math.min(.9,.05+seen/180)};r.addEventListener("touchstart",move,{passive:false});r.addEventListener("touchmove",move,{passive:false});r.addEventListener("touchend",()=>t.style.display="none");r.addEventListener("pointerdown",move);r.addEventListener("pointermove",e=>{if(e.buttons)move(e)});r.addEventListener("pointerup",()=>t.style.display="none")}if(i===1){const target=["0","2","1","7"];let pos=0,seq=[];const out=document.querySelector("#sequence"),answer=document.querySelector("#answer"),buttons=[...document.querySelectorAll(".tile")];const resetWrong=b=>{b.classList.add("wrong");setTimeout(()=>{buttons.forEach(x=>x.classList.remove("ok","wrong"));pos=0;seq=[];out.textContent="— — — —";answer.value=""},320)};buttons.forEach(b=>b.onclick=e=>{e.preventDefault();const v=b.dataset.v;if(v!==target[pos])return resetWrong(b);b.classList.add("ok");seq.push(v);pos++;out.textContent=[...seq,...Array(4-seq.length).fill("—")].join(" ");answer.value=seq.join("");if(pos===4)out.textContent="0 2 : 1 7"})}if(i===2)document.querySelector("#play").onclick=play;if(i===4){let a=130,n=document.querySelector("#needle");n.style.transform=`rotate(${a}deg)`;document.querySelector("#turn").onclick=()=>{a=Math.max(0,a-26);n.style.transform=`rotate(${a}deg)`}}}function play(){const ctx=new(window.AudioContext||window.webkitAudioContext)(),seq="-. --- .-. -..",u=.12;let t=ctx.currentTime+.1;for(const c of seq){if(c===" "){t+=u*3;continue}const d=c==="."?u:u*3,o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=650;g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.2,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+d+.02);t+=d+u}}function end(){app.innerHTML=`<section class="panel"><p class="ey">DOSSIER DÉCHIFFRÉ</p><h1>Tu as trouvé la trace.<br><span>Maintenant, elle sait que tu existes.</span></h1><button class="primary" id="again">REJOUER</button></section>`;document.querySelector("#again").onclick=()=>{localStorage.removeItem("d17v3");go("accueil")}}function render(){const s=location.hash.replace(/^#\//,"")||"accueil";if(s==="accueil")return home();if(s==="fin")return end();const i=levels.findIndex(x=>x.slug===s);i<0?go("accueil"):level(i)}document.querySelector("#reset").onclick=()=>{localStorage.removeItem("d17v3");go("accueil")};addEventListener("hashchange",render);render()})();</script></body></html>
